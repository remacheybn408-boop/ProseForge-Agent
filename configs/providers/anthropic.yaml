# Anthropic / Claude provider profiles (portable).
#
# Model ids are concrete; the API key is the environment-driven value, read at
# runtime from `api_key_env` and never written here.

providers:
  anthropic_main:        # Messages API
    family: anthropic
    protocol: anthropic_messages
    model: claude-sonnet-4-6
    base_url: "https://api.anthropic.com/v1"
    api_key_env: ANTHROPIC_API_KEY
    anthropic_version: "2023-06-01"
    privacy_class: cloud
    certification_level: shape_tested
    capabilities:
      text: supported
      streaming: supported
      json: supported
      tools: supported
      vision: supported
